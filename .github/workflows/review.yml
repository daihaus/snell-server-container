name: Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

# A called workflow uses the caller's GITHUB_TOKEN permissions, so grant exactly
# what daihaus/.github's code-review.yml needs.
permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  code-review:
    uses: daihaus/.github/.github/workflows/code-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      is_draft: ${{ github.event.pull_request.draft }}
      head_repo_full_name: ${{ github.event.pull_request.head.repo.full_name }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
