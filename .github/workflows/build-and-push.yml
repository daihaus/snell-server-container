name: Build and push image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "snell-server version to build (e.g. 5.0.1)"
        required: true
        default: "5.0.1"
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      channel: ${{ steps.vars.outputs.channel }}
      tags: ${{ steps.vars.outputs.tags }}
    steps:
      - name: Resolve version, channel and tags
        id: vars
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            channel="${{ github.event.inputs.channel }}"
          else
            # tag push, e.g. refs/tags/v5.0.1 -> 5.0.1
            ref="${GITHUB_REF#refs/tags/}"
            version="${ref#v}"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              channel="stable"
            else
              channel="beta"
            fi
          fi

          if [[ ! "$version" =~ ^[0-9]+ ]]; then
            echo "::error::version must start with a number (got '$version')"
            exit 1
          fi

          # Mirror build.sh: stable -> version + major + latest; beta -> version only
          major="${version%%.*}"
          tags="$version"
          if [ "$channel" = "stable" ]; then
            tags="$tags $major latest"
          fi

          {
            echo "version=$version"
            echo "channel=$channel"
            echo "tags=$tags"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved version=$version channel=$channel tags=[$tags]"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          tag_args=()
          for t in ${{ needs.prepare.outputs.tags }}; do
            tag_args+=("-t" "${REGISTRY}/${IMAGE_NAME}:${t}")
          done
          digest_refs=()
          for d in *; do
            digest_refs+=("${REGISTRY}/${IMAGE_NAME}@sha256:${d}")
          done
          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect pushed image
        run: |
          set -euo pipefail
          first_tag="$(echo '${{ needs.prepare.outputs.tags }}' | awk '{print $1}')"
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${first_tag}"
